template: "input_range.jinja"

- benchmark:
  name: ["count_if", "all_of", "for_each", "find_if"]
  policy: ["par", "par_unseq", "seq"]
  container: ["std::vector"]
  type: ["int"]
  predicate: ["[](int i) { return i % 4 == 0; }"]

- benchmark:
  name: ["adjacent_find"]
  policy: ["par", "par_unseq", "seq"]
  container: ["std::vector"]
  type: ["int"]
  predicate: ["std::greater<int>()"]

  environment:
    compiler: ["clang++-19", "g++"]
    compiler_opts: ["-O2"]
    size: ["10000", "20000", "30000", "40000", "50000", "60000", "70000"]

